[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 排除临时目录和非测试目录
norecursedirs = 
    pytest-cache-files-*
    .git
    venv
    godot_plugin
    logs
    backups
    __pycache__
    runtime-artifacts-*
    temp
    tmp

# 解决 Windows 编码输出问题并禁用缓存以消除权限噪音
addopts = -v --tb=short -p no:cacheprovider

# 过滤特定的环境警告
filterwarnings =
    ignore::pytest.PytestCacheWarning
    ignore:.*could not create cache path.*:UserWarning
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers

# 注册自定义标记
markers =
    live: live sandbox tests requiring an active api_server and Godot editor

