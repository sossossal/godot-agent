name: release-validation

on:
  push:
  pull_request:

jobs:
  release-artifacts:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run targeted release and governance validation tests
        env:
          PYTHONUTF8: "1"
        run: >
          python -m pytest
          tests/test_cli.py
          tests/test_godot_cli.py
          tests/test_release_ci_artifacts.py
          tests/test_clean_machine_bootstrap.py
          tests/test_governance.py
          tests/test_production_scale.py
          tests/test_release_request_auth.py
          tests/test_release_distribution.py
          tests/test_release_live_runner_baseline.py
          tests/test_release_live_ci_artifacts.py
          tests/test_release_promotion.py
          tests/test_release_execution.py
          tests/test_contracts.py
          -q

      - name: Export non-live staging release validation artifacts
        env:
          PYTHONUTF8: "1"
        run: python tools/export_release_ci_artifacts.py --output-dir logs/reports/release_validation_ci

      - name: Upload release validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-artifacts
          path: logs/reports/release_validation_ci
          if-no-files-found: error
