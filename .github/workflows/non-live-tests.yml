name: non-live-tests

on:
  push:
  pull_request:

jobs:
  stable:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run stable non-live test suite
        env:
          PYTHONUTF8: "1"
        run: >
          python -m pytest
          tests/test_agent.py
          tests/test_api.py
          tests/test_agent_compatibility.py
          tests/test_cli.py
          tests/test_context_logic.py
          tests/test_final_acceptance.py
          tests/test_godot_cli.py
          tests/test_governance.py
          tests/test_index_service.py
          tests/test_integration.py
          tests/test_migrations.py
          tests/test_mcp_server.py
          tests/test_production_scale.py
          tests/test_production_samples.py
          tests/test_quality_dashboard.py
          tests/test_remote_mcp_bridge.py
          tests/test_skill_regressions.py
          tests/test_template_registry.py
          -q

  full-non-live:
    needs: stable
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run full non-live test suite
        env:
          PYTHONUTF8: "1"
        run: python -m pytest -m "not live" -q
