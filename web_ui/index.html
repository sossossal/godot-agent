<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godot Studio Agent — 智能游戏编程助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ========== 顶部导航 ========== -->
    <header class="topbar">
        <div class="logo">
            <span class="logo-icon">🎮</span>
            <span class="logo-text">Godot Studio <em>Agent</em></span>
            <span class="version-badge">v2.0</span>
        </div>
        <div class="topbar-actions">
            <button id="btnNewSession" class="btn-ghost" title="清空会话，开始新项目">🔄 新会话</button>
            <a href="/docs" target="_blank" class="btn-ghost">📜 API 文档</a>
            <div id="healthDot" class="health-dot" title="服务状态"></div>
        </div>
    </header>

    <!-- ========== 主体三栏布局 ========== -->
    <main class="layout">

        <!-- ── 左侧：角色面板 ── -->
        <aside class="panel-roles" id="panelRoles">
            <div class="panel-title">🎭 Agent 角色</div>
            <div id="rolesContainer" class="roles-list">
                <div class="skeleton-role"></div>
                <div class="skeleton-role"></div>
                <div class="skeleton-role"></div>
            </div>

            <div class="panel-title mt-16">⚡ 快速命令</div>
            <div class="quickcmds" id="quickCmds">
                <button class="qcmd" data-cmd="生成 2D 玩家移动脚本">🏃 2D 移动</button>
                <button class="qcmd" data-cmd="生成存档读档系统">💾 存档系统</button>
                <button class="qcmd" data-cmd="为敌人创建巡逻追击 AI">🤖 敌人 AI</button>
                <button class="qcmd" data-cmd="生成背包道具系统">🎒 背包系统</button>
                <button class="qcmd" data-cmd="为村民 NPC 生成对话树">💬 对话树</button>
                <button class="qcmd" data-cmd="创建玩家血量 HUD">❤️ 血量 HUD</button>
                <button class="qcmd" data-cmd="添加 BGM 音频管理器">🎵 音频管理</button>
                <button class="qcmd" data-cmd="程序化生成地牢关卡">🗺️ 关卡生成</button>
                <button class="qcmd" data-cmd="生成对象池优化子弹">⚡ 对象池</button>
                <button class="qcmd" data-cmd="创建 TCP 仿真服务器">🌐 TCP 仿真</button>
            </div>
        </aside>

        <!-- ── 中央：对话 + 代码区 ── -->
        <section class="panel-chat">
            <!-- 消息流 -->
            <div class="messages" id="messages">
                <div class="msg-system">
                    <span class="msg-icon">🎮</span>
                    <div class="msg-bubble">
                        <strong>Godot Studio Agent</strong> 已就绪！<br>
                        我可以帮你生成 GDScript 代码、设计 UI 界面、创建 AI 角色、编写剧情系统……<br>
                        <em>快试试输入「生成 2D 玩家移动脚本」</em>
                    </div>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <textarea id="cmdInput" placeholder="用自然语言描述你需要什么… 例如：为 Boss 创建多阶段 AI，生成背包存档系统" rows="3"></textarea>
                <div class="input-actions">
                    <button id="btnPipeline" class="btn-ghost btn-sm" title="流水线模式：多条命令换行分隔，顺序执行">🔀 流水线</button>
                    <button id="btnSend" class="btn-primary">
                        <span id="sendLabel">发送</span>
                        <span id="sendSpinner" class="spinner hidden"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ── 右侧：代码预览 + 调试 ── -->
        <aside class="panel-code">
            <div class="panel-title">
                💻 代码预览
                <div class="code-actions">
                    <button id="btnCopy" class="btn-ghost btn-xs" title="复制代码">📋</button>
                    <button id="btnSaveFile" class="btn-ghost btn-xs" title="下载为 .gd 文件">💾</button>
                </div>
            </div>
            <div id="codeFilename" class="code-filename">— 无代码 —</div>
            <div id="codeBlock" class="code-block">
                <pre><code id="codeContent" class="language-gdscript">-- 执行命令后，生成的 GDScript 代码将在此显示 --</code></pre>
            </div>

            <div class="panel-title mt-16">📊 调试监控</div>
            <div id="debugPanel" class="debug-panel">
                <div class="debug-row"><span>命令总数</span><span id="dbgTotal">0</span></div>
                <div class="debug-row"><span>成功率</span><span id="dbgSuccess">—</span></div>
                <div class="debug-row"><span>当前角色</span><span id="dbgRole">—</span></div>
                <div class="debug-row"><span>置信度</span><span id="dbgConf">—</span></div>
            </div>

            <div class="panel-title mt-16">📜 执行历史</div>
            <div id="historyList" class="history-list"></div>
        </aside>

    </main>

    <!-- ========== 提示 Toast ========== -->
    <div id="toast" class="toast hidden"></div>

    <script src="/static/app.js"></script>
</body>

</html>
