# Godot Agent 系统配置文件 (V1.4.0)

# 1. 环境配置 (Environment)
godot:
  executable_path: ""          # Godot 可执行文件路径
  project_path: "."            # 锁定为主项目路径
  editor_port: 6007            # 插件通信端口
  timeout: 30                  # 命令执行超时 (秒)

# 2. 路由配置 (Routing)
routing:
  default_priority: 5          # 默认优先级
  confidence_threshold: 0.3    # 识别阈值
  
# 3. 角色功能配置 (Roles)
roles:
  architect:
    enabled: true
    priority: 6
    keywords: ["制作", "规划", "设定", "蓝图"]
  
  developer:
    enabled: true
    priority: 5
    keywords: ["创建", "添加", "场景", "节点", "注入", "挂载"]
  
  code_generator:
    enabled: true
    priority: 2
    keywords: ["生成", "代码", "脚本", "逻辑", "信号", "重构"]
    default_language: "gdscript"
  
  tester:
    enabled: true
    priority: 3
    keywords: ["测试", "验证", "调试", "运行", "截图"]
  
  resource_manager:
    enabled: true
    priority: 4
    keywords: ["发布", "导出", "整理", "审计", "修复"]

# 4. 运行与日志配置 (Runtime)
runtime:
  generated_root: "agent_modules" # 文件隔离目录
  history_enabled: true
  history_path: "logs/task_history.json"
  log_level: "INFO"
  auto_save: true
  debug: false

# 5. LLM 配置 (用于语义参数映射)
llm:
  enabled: false
  api_key: ""
  base_url: "https://api.openai.com/v1"
