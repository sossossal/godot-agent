# Godot Studio Agent — 配置文件
# 修改 godot.executable_path 指向你的 Godot 可执行文件

godot:
  # Windows 示例: C:/Godot/Godot_v4.x.exe
  # 留空则自动从 PATH 中查找
  executable_path: ""
  # 默认操作的 Godot 项目路径（可在 Web UI 中动态修改）
  project_path: ""

api:
  host: "0.0.0.0"
  port: 8000
  reload: true

# LLM 语义路由（可选）
# 当关键词路由置信度 < 0.3 时自动触发
# 支持 openai / gemini / ollama
llm:
  enabled: false
  provider: "openai" # openai | gemini | ollama
  model: "gpt-4o-mini"
  api_key: "" # 从环境变量 OPENAI_API_KEY 读取也可
  ollama_base_url: "http://localhost:11434"

# 角色配置（可临时禁用某个角色）
roles:
  developer: { enabled: true }
  code_generator: { enabled: true }
  tester: { enabled: true }
  ai_controller: { enabled: true }
  resource_manager: { enabled: true }
  simulation: { enabled: true }
  narrative: { enabled: true }
  ui_designer: { enabled: true }
  audio_manager: { enabled: true }
  level_designer: { enabled: true }
  optimizer: { enabled: true }

# 未来功能预留
future:
  multiplayer_agent: { enabled: false } # 联机/多人游戏 Agent（预留）
  shader_generator: { enabled: false } # Shader 代码自动生成（预留）
  localization_agent: { enabled: false } # 多语言本地化 Agent（预留）
  itch_publisher: { enabled: false } # 一键发布到 itch.io（预留）
